name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  LANG: C.UTF-8
  TZ: UTC

jobs:
  quality:
    name: Format, lint, architecture, and governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check formatting
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Check architecture boundaries
        run: pnpm check:architecture
      - name: Check normative document versions
        run: pnpm check:document-versions
      - name: Check frozen performance profile
        run: pnpm check:performance-profile
      - name: Check browser spike evidence
        run: pnpm check:browser-spike-evidence

  types-and-tests:
    name: TypeScript and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck isolated platforms
        run: pnpm typecheck
      - name: Run unit, property, and conformance tests
        run: pnpm test

  build-and-generated:
    name: Build and generated-code consistency
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build ESM package
        run: pnpm build
      - name: Check locked reference corpus identities
        run: node ./scripts/check-reference-corpora.mjs
      - name: Check append-only reference corpus history
        env:
          CORPUS_HISTORY_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm check:reference-corpus-history
      - name: Check Contract Bundle and independent consumer
        run: pnpm contract:check

  dependency-policy:
    name: Dependency audit and licenses
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm check:dependencies
      - name: Inventory production licenses
        run: pnpm check:licenses
